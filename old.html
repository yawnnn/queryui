<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SQLite Browser Visualizer (Local)</title>
    <style>
        body {
            font-family: system-ui, Segoe UI, Roboto, Arial;
            margin: 18px;
            background: #f7f7fb;
            color: #111
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center
        }

        label {
            font-weight: 600
        }

        select,
        input,
        textarea,
        button {
            font: inherit;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc
        }

        .panel {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(20, 20, 40, 0.06);
            margin-bottom: 12px
        }

        table {
            border-collapse: collapse;
            width: 100%
        }

        table th,
        table td {
            padding: 8px;
            border: 1px solid #e6e6ea;
            text-align: left;
            vertical-align: top;
            cursor: pointer
        }

        .cols-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .expr-where-container {
            max-height: 220px;
            overflow: auto;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .expr-block {
            padding: 10px;
            background: #fafafa;
            border-radius: 8px
        }

        textarea {
            width: 100%;
            min-height: 1em;
            resize: vertical
        }

        .muted {
            color: #666;
            font-size: 13px
        }

        .btn {
            background: #111;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer
        }

        .btn.secondary {
            background: #e9e9ee;
            color: #111
        }

        .result-wrap {
            overflow: auto;
            max-height: 65vh;
            padding: 6px
        }
    </style>
</head>

<body>
    <h2>SQLite Browser Visualizer — local, single-file</h2>

    <!-- Hardcoded DB path loading -->
    <!-- <div class="panel">
        <label>Load DB (hardcoded path)</label>
        <input id="dbPath" placeholder="pf2.db" value="pf2.db" style="width:200px" />
        <button class="btn" id="loadDb">Load</button>
        <div class="muted">Loads via fetch → sql.js; file must exist relative to this HTML.</div>
    </div> -->
    <div class="panel">
        <div class="row" style="justify-content:space-between">
            <div>
                <label>Select a local .sqlite / .db file</label>
                <input id="fileInput" type="file" accept="*/*" />
                <div class="muted">This runs fully in your browser using sql.js (WASM). The file never leaves your
                    machine.</div>
            </div>
            <div style="text-align:right">
                <button id="btnExportCsv" class="btn secondary">Export results → CSV</button>
            </div>
        </div>
    </div>

    <div class="panel" id="schemaPanel" style="display:none">
        <div class="row">
            <div style="flex:1">
                <label>Table</label>
                <select id="tableSelect"></select>
            </div>
            <div>
                <label>Global WHERE</label>
                <textarea id="globalWhere"></textarea>
            </div>
        </div>

        <hr style="margin:12px 0">
        <div>
            <label>Columns</label>
            <div class="row" style="margin-bottom:6px">
                <button id="selectAll" class="btn secondary">Select all</button>
                <button id="deselectAll" class="btn secondary">Deselect all</button>
            </div>

            <div id="colsStrip" class="cols-strip"></div>

            <div class="expr-where-container" id="exprWhereContainer"></div>
        </div>

        <hr style="margin:12px 0">
        <div class="row">
            <label>ORDER BY</label>
            <input id="orderBy" placeholder="e.g. created_at DESC" />
            <label>LIMIT</label>
            <input id="limit" style="width:80px" placeholder="100" />
            <button id="runQuery" class="btn">Run</button>
            <button id="showSql" class="btn secondary">Show SQL</button>
            <button id="exportCsv" class="btn secondary">Export CSV</button>
        </div>
    </div>

    <div id="resultPanel" class="panel" style="display:none">
        <h3>Results</h3>
        <div class="result-wrap" id="resultWrap"></div>
        <div id="executedSql" class="muted" style="margin-top:10px"></div>
    </div>

    <script>
        function log(msg) {  }

        // Load sql.js (WASM)
        (function () {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js';
            script.onload = () => initSqlJs({ locateFile: filename => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + filename }).then(SQL => { window.SQL = SQL; log('sql.js loaded'); });
            script.onerror = () => log('Failed to load sql.js from CDN — check network.');
            document.head.appendChild(script);
        })();

        let db = null; let lastResult = null;
        const fileInput = document.getElementById('fileInput');
        const schemaPanel = document.getElementById('schemaPanel');
        const tableSelect = document.getElementById('tableSelect');
        const colsStrip = document.getElementById('colsStrip');
        const exprWhereContainer = document.getElementById('exprWhereContainer');
        const selectAll = document.getElementById('selectAll');
        const deselectAll = document.getElementById('deselectAll');
        const runQuery = document.getElementById('runQuery');
        const globalWhere = document.getElementById('globalWhere');
        const orderBy = document.getElementById('orderBy');
        const limit = document.getElementById('limit');
        const executedSql = document.getElementById('executedSql');
        const showSql = document.getElementById('showSql');
        const exportCsv = document.getElementById('exportCsv');

        // const dbPath = document.getElementById('dbPath');
        // const loadBtn = document.getElementById('loadDb');
        // loadBtn.onclick = async () => {
        //     if (!window.SQL) { alert('sql.js still loading...'); return; }
        //     const path = dbPath.value.trim();
        //     try {
        //         const buf = await fetch(path).then(r => r.arrayBuffer());
        //         db = new window.SQL.Database(new Uint8Array(buf));
        //         await refreshSchema();
        //         schemaPanel.style.display = 'block';
        //     } catch (e) { alert('Failed to load DB: ' + e); }
        // };


        fileInput.addEventListener('change', async (ev) => {
            const f = ev.target.files[0];
            if (!f) return;
            currentFileName = f.name;
            const buffer = await f.arrayBuffer();
            if (!window.SQL) { log('sql.js not ready yet — please wait a second and re-open the file.'); return; }
            try {
                db = new window.SQL.Database(new Uint8Array(buffer));
                log('Database loaded: ' + f.name);
                await refreshSchema();
                schemaPanel.style.display = 'block';
                resultPanel.style.display = 'none';
            } catch (err) { log('Failed to open database: ' + err); }
        });

        async function refreshSchema() {
            const res = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' ORDER BY name");
            const rows = res[0] ? res[0].values : [];
            tableSelect.innerHTML = '';
            rows.forEach(r => { let o = document.createElement('option'); o.value = r[0]; o.textContent = r[0]; tableSelect.appendChild(o); });
            if (rows.length) loadColumns(rows[0][0]);
        }

        tableSelect.onchange = () => loadColumns(tableSelect.value);

        function loadColumns(tbl) {
            const qi = db.exec(`PRAGMA table_info('${tbl.replace(/'/g, "''")}')`);
            const cols = qi[0] ? qi[0].values.map(r => r[1]) : [];
            colsStrip.innerHTML = ''; exprWhereContainer.innerHTML = '';
            cols.forEach(col => {
                const btn = document.createElement('button');
                btn.textContent = col; btn.className = 'btn secondary'; btn.dataset.col = col;
                btn.onclick = () => toggleCol(col, btn);
                colsStrip.appendChild(btn);
            });
        }

        function toggleCol(col, btn) {
            const exists = document.getElementById('expr-' + col);
            if (exists) { exists.remove(); btn.classList.remove('active'); return; }
            btn.classList.add('active');
            const block = document.createElement('div'); block.className = 'expr-block'; block.id = 'expr-' + col;
            block.innerHTML = `<label>${col}</label>
        <div>Expression</div>
        <textarea data-type="expr" data-col="${col}"></textarea>
        <div>Per-column WHERE</div>
        <textarea data-type="where" data-col="${col}"></textarea>`;
            exprWhereContainer.appendChild(block);
        }

        selectAll.onclick = () => {
            [...colsStrip.children].forEach(b => { if (!b.classList.contains('active')) b.click(); });
        };
        deselectAll.onclick = () => {
            [...colsStrip.children].forEach(b => { if (b.classList.contains('active')) b.click(); });
        };

        function buildQuery() {
            const tbl = tableSelect.value;
            const blocks = [...exprWhereContainer.children];
            const selects = blocks.map(bl => {
                const col = bl.id.replace('expr-', '');
                const expr = bl.querySelector('[data-type="expr"]').value.trim() || col;
                return expr;
            });
            if (!selects.length) throw new Error('No columns selected');
            let sql = `SELECT ${selects.join(', ')} FROM "${tbl}"`;

            const g = globalWhere.value.trim();
            if (g) sql += ` WHERE ${g}`;
            const ob = orderBy.value.trim(); if (ob) sql += ` ORDER BY ${ob}`;
            const lim = limit.value.trim(); if (lim) sql += ` LIMIT ${lim}`;
            return sql;
        }

        runQuery.onclick = () => {
            try {
                const sql = buildQuery();
                executedSql.textContent = sql;
                const r = db.exec(sql);
                if (!r.length) { resultWrap.innerHTML = 'No rows'; resultPanel.style.display = 'block'; return; }
                lastResult = r[0]; renderResult(r[0]);
            } catch (e) { alert(e); }
        };

        function renderResult(res) {
            const tbl = document.createElement('table');
            const thead = document.createElement('thead');
            const tr = document.createElement('tr');
            res.columns.forEach((c, i) => {
                const th = document.createElement('th'); th.textContent = c;
                th.onclick = () => sortBy(i);
                tr.appendChild(th);
            });
            thead.appendChild(tr); tbl.appendChild(thead);

            const tb = document.createElement('tbody');
            res.values.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    let v = cell == null ? '' : String(cell);
                    v = v.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1<\/a>');
                    td.innerHTML = v;
                    tr.appendChild(td);
                });
                tb.appendChild(tr);
            });
            tbl.appendChild(tb);
            resultWrap.innerHTML = ''; resultWrap.appendChild(tbl);
            resultPanel.style.display = 'block';
        }

        function sortBy(idx) {
            lastResult.values.sort((a, b) => {
                const x = a[idx], y = b[idx];
                return x == y ? 0 : (x > y ? 1 : -1);
            });
            renderResult(lastResult);
        }

        showSql.onclick = () => {
            try { executedSql.textContent = buildQuery(); } catch (e) { alert(e); }
        };

        exportCsv.onclick = () => {
            if (!lastResult) { alert('Run a query first'); return; }
            const cols = lastResult.columns;
            const rows = lastResult.values;
            const esc = v => !v ? '' : String(v).replace(/"/g, '""');
            const out = [cols.map(esc).join(',')].concat(rows.map(r => r.map(esc).join(','))).join('');
            const blob = new Blob([out], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'export.csv'; a.click();
        };
    </script>
</body>

</html>
