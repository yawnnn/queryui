<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SQLite Visualizer</title>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/sql-wasm.js">  -->
    <script src="resources/sql-wasm-1.13.0.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <!-- Table and Column Selection -->
    <div class="panel">
        <div class="sel-panel">
            <!-- Left side-->
            <div>
                <select id="tableSelect"></select>
                <div id="colsSelect"></div>
                <button class="btn-secondary" id="selectAll"></button>
            </div>

            <!-- Right side -->
            <div>
                <label>WHERE
                    <input id="whereClause" type="text" />
                </label><br />

                <label>ORDER BY
                    <input id="orderByClause" type="text" />
                </label><br />

                <label>LIMIT
                    <input id="limitClause" type="text" />
                </label>
                <label>DISTINCT
                    <input id="distinctClause" type="checkbox" />
                </label><br />

                <button class="btn-secondary" id="prev" disabled>◀ Previous</button>
                <button class="btn-secondary" id="next" disabled>Next ▶</button>

                <div id="showSql"></div>
            </div>
        </div>

        <button class="btn" id="runQuery">Run</button>
        <span id="rowCount"></span>
        <!-- <button class="btn-secondary" id="exportCsv" hidden>Export to csv</button> -->
        <button class="btn-secondary" id="importQuery">Import query</button>
        <button class="btn-secondary" id="exportQuery" hidden>Export query</button>
    </div>


    <!-- Results -->
    <div id="results">
        <!-- ..rows -->
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
