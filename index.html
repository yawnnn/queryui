<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Pragma" content="no-cache">
    <title>SQLite Visualizer</title>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/sql-wasm.js">  -->
    <script src="resources/sql-wasm-1.13.0.js"></script>
    <script>
        // cache buster
        let link = document.createElement("link");
        link.rel = "stylesheet";
        link.type = "text/css";
        link.href = "style.css?v=" + Date.now();
        document.head.appendChild(link);
    </script>
    <!-- <link rel="stylesheet" type="text/css" href="style.css"> -->
</head>

<body>
    <!-- Table and Column Selection -->
    <div class="panel">
        <div class="sel-panel">
            <!-- LEFT SIDE -->
            <div>
                <select id="tableSelect"></select>
                <div id="colsSelect"></div>
                <button class="btn-secondary" id="selectAll"></button>
            </div>

            <!-- RIGHT SIDE -->
            <div>
                <label>WHERE
                    <input id="whereClause" type="text" />
                </label><br />

                <label>ORDER BY
                    <input id="orderByClause" type="text" />
                </label><br />

                <label>LIMIT
                    <input id="limitClause" type="text" />
                </label>
                <label>DISTINCT
                    <input id="distinctClause" type="checkbox" />
                </label><br />

                <button class="btn-secondary" id="prev" disabled>◀ Previous</button>
                <button class="btn-secondary" id="next" disabled>Next ▶</button>

                <div id="showSql"></div>
            </div>
        </div>

        <button class="btn" id="runQuery">Run</button>
        <span id="rowCount"></span>
        <!-- <button class="btn-secondary" id="exportCsv" hidden>Export to csv</button> -->
        <button class="btn-secondary" id="importQuery">Import query</button>
        <button class="btn-secondary" id="exportQuery" hidden>Export query</button>
    </div>


    <!-- Results -->
    <div id="results">
        <!-- Table gets dynamically inserted here -->
    </div>

    <script>
        // cache buster
        let s = document.createElement("script");
        s.src = "script.js?v=" + Date.now();
        document.body.appendChild(s);
    </script>
    <!-- <script src="script.js"></script> -->
</body>

</html>
